<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        .dashboard-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-image {
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            position: relative;
        }

        .dashboard-image img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        .welcome-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgb(8, 8, 8);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            opacity: 0;
            animation: fadeInText 3s forwards 1s;
        }

        .welcome-text h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .welcome-text p {
            font-size: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translate(-50%, -55%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="dashboard-image">
        <img src="/static/uploads/appliances/logoo.png" alt="Welcome Image">
        <div class="welcome-text">
            <h1>Welcome!!!!</h1>
              {% if session.get("user_id") %}
    <span>Welcome, {{ session.get("user_name") }}</span>
    {% endif %}
        </div>
    </div>
</div>

</body>
</html>
