<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    font-family: Arial, sans-serif;
    background: rgba(0,0,0,0.6);
}

.modal-custom {
    background: #fff;
    max-width: 500px;
    margin: 80px auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.modal-header h3 {
    margin: 0;
    color: #0d6efd;
}

.close {
    font-size: 22px;
    text-decoration: none;
    color: #555;
}

.item {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e0e0e0;
}

.item img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    margin-right: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.item-details {
    flex: 1;
}

.item-details strong {
    display: block;
    margin-bottom: 5px;
    font-size: 16px;
}

.item-details p {
    margin-bottom: 5px;
    font-size: 14px;
}

.item-details form button {
    margin-right: 5px;
    margin-top: 5px;
}

.btn-decrease {
    background: #dc3545;
    color: white;
    border: none;
    padding: 3px 8px;
    border-radius: 5px;
}

.btn-increase {
    background: #198754;
    color: white;
    border: none;
    padding: 3px 8px;
    border-radius: 5px;
}

.btn-remove {
    background: #6c757d;
    color: white;
    border: none;
    padding: 3px 8px;
    border-radius: 5px;
}

.total {
    font-size: 18px;
    font-weight: 600;
    margin-top: 15px;
    text-align: right;
}

.apply-loan-btn {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background-color: #0d6efd;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.apply-loan-btn:hover {
    background-color: #0b5ed7;
}

.empty-cart {
    text-align: center;
    margin-top: 30px;
    font-size: 16px;
    color: #6c757d;
}
</style>
</head>
<body>

<div class="modal-custom">
    <div class="modal-header">
        <h3>Your Cart</h3>
        <a href="/index1" class="close">✖</a>
    </div>

    {% if cart_items %}
        {% for item in cart_items %}
       <div class="item">
    <img src="{{ url_for('static', filename=item.image) }}" alt="{{ item.appliance_name }}">

    <div class="item-details">
        <strong>{{ item.appliance_name }}</strong>
        <p>₱{{ "%.2f"|format(item.price) }} × {{ item.quantity }}</p>
        <p>Subtotal: ₱{{ "%.2f"|format(item.price * item.quantity) }}</p>

        <div class="d-flex flex-wrap gap-2 mt-2">

            <!-- Quantity + Remove -->
            <form action="/update_cart/{{ item.appliance_id }}" method="post" class="d-flex gap-2">
                <button name="action" value="decrease" class="btn btn-sm btn-danger">−</button>
                <button name="action" value="increase" class="btn btn-sm btn-success">+</button>
                <button name="action" value="remove" class="btn btn-sm btn-secondary">Remove</button>
            </form>

            <!-- ✅ APPLY FOR LOAN (Correct ID used) -->
            <form action="{{ url_for('apply_loan', appliance_id=item.appliance_id) }}" method="GET">
                <button type="submit" class="btn btn-sm btn-primary">
                    Apply for Loan
                </button>
            </form>

        </div>
    </div>
</div>
        {% endfor %}

        <div class="total">
            Total: ₱{{ "%.2f"|format(total) }}
        </div>

        <!-- Apply for Loan Button -->
    

    {% else %}
        <p class="empty-cart">Your cart is empty.</p>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
