<!DOCTYPE html>
<html>
<head>
<title>My Loans</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    padding: 30px;
    background: linear-gradient(to right, #eef2ff, #f8fafc);
    font-family: 'Segoe UI', sans-serif;
}

/* PAGE TITLE */
.page-title {
    font-weight: 600;
    margin-bottom: 25px;
    color: #1e293b;
}

/* CARD */
.card {
    border: none;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

/* TITLE */
.loan-title {
    font-size: 18px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 10px;
}

/* INFO ROW */
.loan-info {
    font-size: 14px;
    color: #475569;
    margin-bottom: 5px;
}

/* BUTTON */
.btn-view {
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    color: white;
    transition: 0.3s;
}

.btn-view:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #0284c7, #0369a1);
}
</style>
</head>

<body>

<h3 class="page-title">📄 My Loan Accounts</h3>

{% for loan in loans %}
<div class="card">

    <div class="loan-title">
        <i class="fas fa-box me-2"></i>{{ loan.appliance_name }}
    </div>

    <div class="loan-info">
        <i class="fas fa-money-bill-wave me-1"></i>
        Loan Amount: ₱{{ "%.2f"|format(loan.amount) }}
    </div>

    <div class="loan-info">
        <i class="fas fa-calendar-alt me-1"></i>
        Months: {{ loan.months }}
    </div>

    <div class="mt-3">
        <a href="/customer/ledger/{{ loan.id }}" class="btn btn-view">
            View Ledger
        </a>
    </div>

</div>
{% endfor %}

</body>
</html>
