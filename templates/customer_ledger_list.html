<!DOCTYPE html>
<html>
<head>
<title>My Loans</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    padding: 20px;
    background: #f4f6f9;
}
.card {
    border-radius: 12px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<h3>📄 My Loan Accounts</h3>

{% for loan in loans %}
<div class="card p-3">
    <h5>{{ loan.appliance_name }}</h5>
    <p>Loan Amount: ₱{{ "%.2f"|format(loan.amount) }}</p>
    <p>Months: {{ loan.months }}</p>

    <a href="/customer/ledger/{{ loan.id }}" class="btn btn-primary">
        View Ledger
    </a>
</div>
{% endfor %}

</body>
</html>
