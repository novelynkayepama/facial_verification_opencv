<!DOCTYPE html>
<html>
<head>
    <title>Payment Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #0ea5e9;
            color: white;
        }

        tr:nth-child(even) {
            background: #f1f5f9;
        }

        .paid {
            color: green;
            font-weight: bold;
        }

        .unpaid {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Payment Schedule</h2>

<table>
    <tr>
        <th>Due Date</th>
        <th>Amount</th>
        <th>Status</th>
    </tr>
    {% for p in schedule %}
    <tr>
        <td>{{ p.due_date }}</td>
        <td>₱{{ "{:,.2f}".format(p.amount) }}</td>
        <td class="{{ p.status|lower }}">{{ p.status }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
